<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Oferta Especial - Nome Limpo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-dark: #020617;
      --blue-1: #0052ff;
      --blue-2: #001e7a;
      --blue-3: #00061a;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 82, 255, 0.12), transparent 35%),
        var(--bg-dark);
      color: #fff;
    }

    .font-title {
      font-family: "Oswald", sans-serif;
    }

    .page-shell {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(12px, var(--safe-top))
        max(12px, var(--safe-right))
        max(12px, var(--safe-bottom))
        max(12px, var(--safe-left));
    }

    .flyer-card {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: calc(100dvh - 24px);
      background: radial-gradient(
        circle at 50% 28%,
        var(--blue-1) 0%,
        var(--blue-2) 55%,
        var(--blue-3) 100%
      );
      overflow: hidden;
      isolation: isolate;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
    }

    .flyer-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 20%),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.10), transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    @media (min-width: 431px) {
      .flyer-card {
        min-height: min(860px, calc(100dvh - 40px));
        border-radius: 28px;
      }
    }

    @media (max-height: 760px) {
      .flyer-card {
        min-height: calc(100dvh - 16px);
      }
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      flex: 1;
      padding:
        clamp(18px, 3.6vw, 30px)
        clamp(16px, 4vw, 24px)
        calc(clamp(16px, 3vw, 24px) + var(--safe-bottom));
    }

    .hero-copy {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .main-title {
      margin: 0;
      line-height: 0.98;
      letter-spacing: 0.02em;
      font-size: clamp(2.2rem, 7.8vw, 3.4rem);
      text-shadow: 0 8px 18px rgba(0, 0, 0, 0.32);
    }

    .main-title .subtitle {
      display: inline-block;
      margin-top: 0.35rem;
      font-size: clamp(1.15rem, 4.1vw, 1.9rem);
      color: #bcd3ff;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .offer-copy {
      width: 100%;
      max-width: 340px;
      color: #ffffff;
    }

    .offer-copy p {
      margin: 0;
    }

    .offer-primary {
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      line-height: 1.45;
      font-weight: 300;
    }

    .offer-discount {
      margin-top: 0.2rem;
      font-size: clamp(1rem, 3.8vw, 1.15rem);
      line-height: 1.45;
      font-weight: 300;
    }

    .offer-discount strong {
      color: #facc15;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 700;
      text-shadow: 0 4px 12px rgba(250, 204, 21, 0.18);
    }

    .bonus-badge {
      display: inline-block;
      margin-top: clamp(12px, 2vw, 18px);
      padding: 0.75rem 1.2rem;
      border-radius: 999px;
      background: #db2777;
      color: #fff;
      font-weight: 700;
      font-size: clamp(0.9rem, 3.2vw, 1.05rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transform: rotate(-2deg);
      box-shadow: 0 8px 22px rgba(219, 39, 119, 0.35);
      border: 1px solid rgba(244, 114, 182, 0.7);
      max-width: 100%;
    }

    .validity {
      margin-top: clamp(10px, 2vw, 16px);
      display: inline-block;
      font-size: clamp(0.72rem, 2.7vw, 0.84rem);
      color: #bfd7ff;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.95;
      border-bottom: 1px solid rgba(59, 130, 246, 0.45);
      padding-bottom: 0.25rem;
    }

    .visual-zone {
      position: relative;
      flex: 1;
      min-height: clamp(300px, 42vh, 470px);
      margin-top: clamp(18px, 3vw, 28px);
      margin-bottom: clamp(100px, 14vh, 130px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .arch-frame,
    .image-shell {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
    }

    .arch-frame {
      width: min(92%, 360px);
      height: 100%;
      border: 2.5px solid rgba(255, 255, 255, 0.95);
      border-radius: 5.2rem 5.2rem 0 0;
      pointer-events: none;
      opacity: 0.92;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
      z-index: 2;
    }

    .image-shell {
      width: min(89%, 348px);
      height: calc(100% - 6px);
      border-radius: 5rem 5rem 0 0;
      overflow: hidden;
      z-index: 1;
      background: #082f95;
    }

    .image-shell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0.96;
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, #00061a 8%, rgba(0, 6, 26, 0.52) 34%, transparent 68%);
      z-index: 2;
      pointer-events: none;
    }

    .cta-wrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(clamp(16px, 3vw, 24px) + var(--safe-bottom));
      z-index: 4;
      padding-inline: clamp(14px, 4vw, 24px);
      display: flex;
      justify-content: center;
    }

    .cta-button {
      width: 100%;
      max-width: 320px;
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.95rem 1.25rem;
      border-radius: 999px;
      background: #25d366;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      box-shadow: 0 10px 24px rgba(37, 211, 102, 0.28);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
      text-align: center;
      line-height: 1.2;
    }

    .cta-button:hover {
      background: #20b858;
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(37, 211, 102, 0.32);
    }

    .cta-button:active {
      transform: scale(0.985);
    }

    .cta-button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.85);
      outline-offset: 3px;
    }

    .cta-icon {
      width: clamp(22px, 5vw, 28px);
      height: clamp(22px, 5vw, 28px);
      flex: 0 0 auto;
    }

    @media (max-width: 380px) {
      .content {
        padding-inline: 14px;
      }

      .bonus-badge {
        padding: 0.65rem 0.95rem;
        letter-spacing: 0.05em;
      }

      .arch-frame {
        width: 94%;
        border-radius: 4.2rem 4.2rem 0 0;
      }

      .image-shell {
        width: 91%;
        border-radius: 4rem 4rem 0 0;
      }

      .cta-button {
        gap: 0.6rem;
        padding-inline: 1rem;
      }
    }

    @media (min-width: 768px) {
      .flyer-card {
        max-width: 440px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cta-button {
        transition: none;
      }

      .cta-button:hover,
      .cta-button:active {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="flyer-card" aria-label="Oferta especial Nome Limpo">
      <div class="content">

        <header class="hero-copy">
          <h1 class="font-title main-title">
            MÊS DA MULHER<br />
            <span class="subtitle">&amp; DO CONSUMIDOR</span>
          </h1>

          <div class="offer-copy">
            <p class="offer-primary">
              Seu <strong>Nome Limpo</strong> em até 60 dias
            </p>

            <p class="offer-discount">
              com <strong>40% de desconto</strong>
            </p>

            <div class="bonus-badge">
              Se for mulher + 10%
            </div>

            <div class="validity">
              Válido até dia 21 de Março
            </div>
          </div>
        </header>

        <div class="visual-zone" aria-hidden="true">
          <div class="arch-frame"></div>

          <div class="image-shell">
            <img
              src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=900&q=80"
              alt="Consultora Financeira"
            />
            <div class="image-overlay"></div>
          </div>
        </div>

        <div class="cta-wrap">
          <a
            href="https://wa.me/5561984301988"
            target="_blank"
            rel="noopener noreferrer"
            class="cta-button"
            aria-label="Falar no WhatsApp pelo número 61 98430-1988"
          >
            <svg
              class="cta-icon"
              fill="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.82 9.82 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
            <span>(61) 98430-1988</span>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
